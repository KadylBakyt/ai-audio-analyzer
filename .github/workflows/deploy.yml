name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 10

      - name: Type check
        run: npm run typecheck

      # Generate demo WAV files if they are missing (e.g. on a fresh clone
      # where the generated assets were not committed).
      - name: Generate demo audio
        run: |
          if [ ! -f public/demo/audio/meeting.wav ]; then
            node scripts/generate-demo-audio.mjs
          else
            echo "Demo audio files already present, skipping generation."
          fi

      - name: Build
        run: npm run build

      # Only deploy on pushes to main (not on PRs).
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-audio-analyzer
